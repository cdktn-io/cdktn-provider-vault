name: alert-open-prs
on:
  schedule:
    - cron: 15 14 * * 1-5
jobs:
  check-open-prs:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    env: {}
    steps:
      - name: Find old PRs
        id: old_prs
        env:
          GH_TOKEN: ${{ github.token }}
        run: |-
          PR_LINKS=$(gh pr list --state open --repo="cdktn-io/cdktn-provider-vault" --search "created:<$(date -d '-2hours' +%FT%TZ)" --json url --jq "map(.url)" )
          if [ "$PR_LINKS" == "[]" ]; then
            echo "No PRs open for more than 2 hour(s)"
          else
            echo "pr_links=$PR_LINKS" >> $GITHUB_OUTPUT
          fi
      - name: Alert Slack on old PRs
        if: ${{ steps.old_prs.outputs.pr_links }}
        uses: slackapi/slack-github-action@45a88b9581bfab2566dc881e2cd66d334e621e2c
        with:
          webhook: ${{ secrets.ALERT_PRS_SLACK_WEBHOOK_URL }}
          webhook-type: webhook-trigger
          payload: "{\"pr_links\":\"${{ join(fromJSON(steps.old_prs.outputs.pr_links), ', ') }}\"}"
    continue-on-error: true
