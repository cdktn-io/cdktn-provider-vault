        run: gh issue create --title "Publishing v$VERSION to NuGet Gallery failed" --body "See $RUN_URL" --label "failed-release"
  release_golang:
    name: Publish to GitHub Go Module Repository
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    if: needs.release.outputs.tag_exists != 'true' && needs.release.outputs.latest_commit == github.sha
    steps:
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: 20.16.0
          package-manager-cache: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version: ^1.18.0
          cache: false
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          artifact-ids: ${{ needs.release.outputs.artifact_id }}
          path: dist
      - name: Restore build artifact permissions
        run: cd dist && setfacl --restore=permissions-backup.acl
        continue-on-error: true
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          path: .repo
      - name: Install Dependencies
        run: cd .repo && yarn install --check-files --frozen-lockfile
      - name: Extract build artifact
        run: tar --strip-components=1 -xzvf dist/js/*.tgz -C .repo
      - name: Move build artifact out of the way
        run: mv dist dist.old
      - name: Create go artifact
        run: cd .repo && npx projen package:go
      - name: Setup Copywrite tool
        uses: hashicorp/setup-copywrite@32638da2d4e81d56a0764aa1547882fc4d209636
      - name: Copy copywrite hcl file
        run: cp .repo/.copywrite.hcl .repo/dist/go/.copywrite.hcl
      - name: Add headers using Copywrite tool
        run: cd .repo/dist/go && copywrite headers
      - name: Remove copywrite hcl file
        run: rm -f .repo/dist/go/.copywrite.hcl
      - name: Remove some text from the README that doesn't apply to Go
        run: |-
          sed -i 's/# CDKTN prebuilt bindings for/# CDKTN Go bindings for/' .repo/dist/go/*/README.md
          sed -i -e '/## Available Packages/,/### Go/!b' -e '/### Go/!d;p; s/### Go/## Go Package/' -e 'd' .repo/dist/go/*/README.md
          sed -i 's/### Go/## Go Package/' .repo/dist/go/*/README.md
          sed -i -e '/API.typescript.md/,/You can also visit a hosted version/!b' -e 'd' .repo/dist/go/*/README.md
          sed -i 's|Find auto-generated docs for this provider here:|Find auto-generated docs for this provider [here](https://github.com/cdktn-io/cdktn-provider-vault/blob/main/docs/API.go.md).|' .repo/dist/go/*/README.md
          sed -i -e '/### Provider Version/,/The provider version can be adjusted/!b' -e 'd' .repo/dist/go/*/README.md
      - name: Copy the README file to the parent directory
        run: cp .repo/dist/go/*/README.md .repo/dist/go/README.md
      - name: Collect go Artifact
        run: mv .repo/dist dist
      - name: Generate token
        id: generate_token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859
        with:
          app-id: ${{ secrets.PROJEN_APP_ID }}
          private-key: ${{ secrets.PROJEN_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: cdktn-provider-vault-go
          permission-contents: write
      - name: Release
        env:
          GIT_USER_NAME: team-cdk-terrain
          GIT_USER_EMAIL: github-team-cdk-terrain@cdktn.io
          GITHUB_TOKEN: x-access-token:${{ steps.generate_token.outputs.token }}
          PUBLIB_DRYRUN: ${{ inputs.dry_run }}
        run: npx -p publib@latest publib-golang
      - name: Extract Version
        id: extract-version
        if: ${{ failure() }}
        run: echo "VERSION=$(cat dist/version.txt)" >> $GITHUB_OUTPUT
        shell: bash
      - name: Create Issue
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.extract-version.outputs.VERSION }}
          RUN_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: gh issue create --title "Publishing v$VERSION to GitHub Go Module Repository failed" --body "See $RUN_URL" --label "failed-release"
