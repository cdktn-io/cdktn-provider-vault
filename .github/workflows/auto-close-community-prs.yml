name: auto-close-community-prs
on:
  pull_request_target:
    types:
      - opened
jobs:
  autoclose:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    if: github.event.pull_request.user.login != 'team-cdk-terrain[bot]' && github.actor != 'dependabot[bot]' && !contains(fromJSON('["OWNER", "MEMBER", "COLLABORATOR", "CONTRIBUTOR"]'), github.event.pull_request.author_association)
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - name: Auto-close PRs by non-collaborators
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr close ${{ github.event.pull_request.number }} --comment "Hi there! 👋 We appreciate your interest, but this is probably not the right place. All the code in this repository is auto-generated using [cdktn-provider-project](https://github.com/cdktn-io/cdktn-provider-project) and [cdktn-repository-manager](https://github.com/cdktn-io/cdktn-repository-manager) from the source [Terraform provider](https://github.com/terraform-providers/terraform-provider-vault). If there are problems, they should be addressed in one of those 3 repositories, not here, as any changes here will just get overwritten the next time there is an update upstream. Please open a new issue or PR in one of those repos. In the meantime, I'll auto-close this. Thanks!"
      - name: Add labels
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr edit ${{ github.event.pull_request.number }} --add-label "invalid,wontfix"
